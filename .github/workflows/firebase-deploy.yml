name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Force install @tailwindcss/oxide Linux x64 binding (workaround npm#4828)
        run: |
          VER=$(node -p "require('./node_modules/@tailwindcss/oxide/package.json').version")
          echo "Detected @tailwindcss/oxide version: $VER"
          npm install --no-save "@tailwindcss/oxide-linux-x64-gnu@${VER}"
          echo "--- Verifying binding install ---"
          ls -la node_modules/@tailwindcss/oxide-linux-x64-gnu/ || (echo "ERROR: binding not installed" && exit 1)
          ls node_modules/@tailwindcss/oxide-linux-x64-gnu/*.node || (echo "ERROR: .node file missing" && exit 1)

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COSTALMANAGER }}
          channelId: live
          projectId: costalmanager
